<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600&amp;display=swap');
    </style>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="49" fill="#352925"/>



  <!-- Initials "SL" in serif -->
  <text
    x="50"
    y="62"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="600"
    fill="#f0ebe4"
    letter-spacing="2"
  >SL</text>

  <!-- Thin underline accent below initials -->
  <line x1="33" y1="67" x2="67" y2="67" stroke="#d4a574" stroke-width="0.8" opacity="0.5"/>
</svg>
